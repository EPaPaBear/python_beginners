<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Week 8: Entity Management (The Horde)</title>
    <style>
        body { font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif; background: #0f172a; color: #f8fafc; padding: 20px; display: flex; flex-direction: column; align-items: center; }
        .container { width: 100%; max-width: 900px; }
        h1 { color: #22c55e; text-align: center; text-transform: uppercase; letter-spacing: 2px; border-bottom: 2px solid #334155; padding-bottom: 10px; margin-bottom: 30px; }

        .battleground { display: grid; grid-template-columns: 250px 1fr; gap: 30px; }

        /* Player UI */
        .hero-panel { background: #1e293b; padding: 20px; border-radius: 12px; border: 2px solid #3b82f6; text-align: center; height: fit-content; }
        .hero-title { font-size: 1.5rem; font-weight: bold; color: #60a5fa; margin-bottom: 15px; }
        
        button { width: 100%; padding: 12px; font-weight: bold; font-size: 1rem; border: none; border-radius: 6px; cursor: pointer; transition: 0.2s; color: white; margin-bottom: 10px; }
        button:active { transform: scale(0.95); }
        button:disabled { opacity: 0.5; cursor: not-allowed; }
        
        .btn-spawn { background: #10b981; }
        .btn-spawn:hover { background: #059669; }
        .btn-aoe { background: #ef4444; margin-top: 20px; border: 2px dashed #f87171; }
        .btn-aoe:hover { background: #dc2626; }

        /* Horde (List) UI */
        .horde-panel { background: #1e293b; padding: 20px; border-radius: 12px; border: 1px solid #334155; min-height: 300px; }
        .panel-header { display: flex; justify-content: space-between; align-items: center; margin-bottom: 20px; border-bottom: 1px solid #334155; padding-bottom: 10px; }
        .horde-title { font-weight: bold; color: #94a3b8; text-transform: uppercase; }
        .list-syntax { font-family: monospace; color: #f59e0b; background: #000; padding: 5px 10px; border-radius: 4px; }

        .enemy-grid { display: flex; flex-wrap: wrap; gap: 15px; }

        /* The Objects */
        .enemy-card { background: #334155; border: 2px solid #475569; border-radius: 8px; width: 120px; padding: 10px; text-align: center; position: relative; transition: 0.3s; }
        .enemy-card.spawn-anim { animation: dropIn 0.3s ease-out; }
        @keyframes dropIn { from { transform: translateY(-20px); opacity: 0; } to { transform: translateY(0); opacity: 1; } }
        
        .enemy-index { position: absolute; top: -10px; left: -10px; background: #f59e0b; color: #000; font-weight: bold; width: 24px; height: 24px; border-radius: 50%; display: flex; align-items: center; justify-content: center; font-size: 0.8rem; }
        .enemy-name { font-weight: bold; color: #f87171; margin-bottom: 5px; }
        .enemy-hp { font-family: monospace; font-size: 1.2rem; color: #22c55e; }
        
        /* Animations */
        .enemy-card.targeted { border-color: #f87171; transform: scale(1.1); box-shadow: 0 0 15px rgba(248, 113, 113, 0.5); background: #451a1a; }
        .enemy-card.dead { filter: grayscale(100%); opacity: 0.3; transform: scale(0.9); }

        #code-readout { background: #000; color: #4af626; font-family: monospace; padding: 15px; border-radius: 8px; margin-top: 20px; min-height: 20px; }

    </style>
</head>
<body>

<div class="container">
    <h1>🧟 The Horde Visualizer</h1>
    
    <div class="battleground">
        <!-- The Player Controller -->
        <div class="hero-panel">
            <div class="hero-title">🧙‍♂️ The Mage</div>
            <p style="color: #94a3b8; font-size: 0.9rem; margin-bottom: 20px;">Use array methods and loops to manage the battlefield.</p>
            
            <button class="btn-spawn" onclick="spawnEnemy()">horde.append(Goblin)</button>
            <button class="btn-aoe" id="btn-aoe" onclick="castAOE()">for target in horde:<br>target.take_damage(20)</button>
        </div>

        <!-- The List of Objects -->
        <div class="horde-panel">
            <div class="panel-header">
                <span class="horde-title">Array: horde_list = []</span>
                <span class="list-syntax" id="len-counter">len(horde_list) == 0</span>
            </div>
            
            <div class="enemy-grid" id="horde-grid">
                <!-- Objects inject here -->
            </div>
        </div>
    </div>

    <div id="code-readout">>>> System online. Waiting for commands...</div>
</div>

<script>
    let horde = []; // Our actual JS array of objects
    let goblinCount = 1;

    function updateGrid() {
        const grid = document.getElementById('horde-grid');
        grid.innerHTML = '';
        
        horde.forEach((enemy, index) => {
            let deadClass = enemy.hp <= 0 ? 'dead' : '';
            grid.innerHTML += `
                <div class="enemy-card ${deadClass}" id="enemy-${index}">
                    <div class="enemy-index">${index}</div>
                    <div class="enemy-name">${enemy.name}</div>
                    <div class="enemy-hp">HP: ${enemy.hp}</div>
                </div>
            `;
        });
        
        document.getElementById('len-counter').innerText = `len(horde_list) == ${horde.length}`;
    }

    function spawnEnemy() {
        // Create a new "Object"
        let newGoblin = { name: "Goblin " + goblinCount, hp: 50 };
        horde.push(newGoblin); // Append to list
        goblinCount++;
        
        updateGrid();
        
        // Add spawn animation to the newest one
        const newCard = document.getElementById(`enemy-${horde.length - 1}`);
        newCard.classList.add('spawn-anim');
        
        document.getElementById('code-readout').innerText = `>>> horde.append(Goblin("${newGoblin.name}", 50))\n>>> Success.`;
    }

    async function castAOE() {
        if (horde.length === 0) {
            document.getElementById('code-readout').innerText = `>>> List is empty. Nothing to attack.`;
            return;
        }

        const btn = document.getElementById('btn-aoe');
        btn.disabled = true; // Lock UI
        document.querySelector('.btn-spawn').disabled = true;

        const readout = document.getElementById('code-readout');
        readout.innerText = `>>> for target in horde:\n...     target.take_damage(20)`;

        // The Visual FOR Loop
        for (let i = 0; i < horde.length; i++) {
            let currentEnemy = horde[i];
            
            // Skip dead enemies
            if (currentEnemy.hp <= 0) continue; 

            // 1. Highlight the current target (The Pointer)
            let card = document.getElementById(`enemy-${i}`);
            card.classList.add('targeted');
            
            // Wait for visual effect
            await new Promise(r => setTimeout(r, 600));
            
            // 2. Modify the object's data
            currentEnemy.hp = Math.max(0, currentEnemy.hp - 20);
            
            // 3. Update UI
            updateGrid();
            
            // Re-apply highlight because updateGrid clears it
            card = document.getElementById(`enemy-${i}`);
            if (currentEnemy.hp > 0) card.classList.add('targeted'); 
            
            await new Promise(r => setTimeout(r, 400));
            
            // 4. Remove highlight, move to next
            card.classList.remove('targeted');
        }

        readout.innerText += `\n>>> AoE Spell Complete!`;
        btn.disabled = false;
        document.querySelector('.btn-spawn').disabled = false;
    }
</script>

</body>
</html>
