<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>The Pygame Render Loop</title>
    <style>
        body { font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif; background: #0f172a; color: #f8fafc; padding: 20px; display: flex; flex-direction: column; align-items: center; }
        .container { width: 100%; max-width: 900px; }
        h1 { color: #38bdf8; text-align: center; text-transform: uppercase; letter-spacing: 2px; border-bottom: 2px solid #334155; padding-bottom: 10px; margin-bottom: 20px; }

        .layout { display: grid; grid-template-columns: 2fr 1fr; gap: 20px; }

        /* The Screen (Canvas) */
        .screen-panel { background: #1e293b; padding: 20px; border-radius: 12px; border: 4px solid #475569; position: relative; }
        .canvas-area { width: 100%; height: 300px; background: #000; position: relative; overflow: hidden; border: 2px dashed #334155; }
        
        .player-rect { width: 40px; height: 40px; background: #22c55e; position: absolute; transition: 0s; box-shadow: 0 0 10px #22c55e; }
        
        .coord-display { position: absolute; top: 10px; left: 10px; font-family: monospace; color: #facc15; font-size: 1.2rem; background: rgba(0,0,0,0.7); padding: 5px 10px; border-radius: 4px; }
        
        .axis-label { position: absolute; font-weight: bold; color: #94a3b8; font-family: monospace; }
        .x-axis { top: 5px; right: 10px; }
        .y-axis { bottom: 10px; left: 5px; transform: rotate(-90deg); transform-origin: left bottom; }

        /* The Code / Loop Logic */
        .code-panel { background: #000; padding: 20px; border-radius: 12px; border: 1px solid #334155; font-family: monospace; font-size: 1.1rem; color: #cbd5e1; }
        .code-line { padding: 5px; border-radius: 4px; transition: 0.1s; margin-bottom: 5px; border-left: 3px solid transparent; }
        .code-line.active { background: #1e3a8a; border-left-color: #38bdf8; color: white; font-weight: bold; }
        
        .keyword { color: #c678dd; }
        .func { color: #61afef; }
        .comment { color: #6a9955; font-size: 0.9rem; }

        /* Controls */
        .controls { display: flex; gap: 10px; justify-content: center; margin-top: 20px; background: #1e293b; padding: 15px; border-radius: 8px; }
        button { padding: 12px 20px; font-weight: bold; border: none; border-radius: 4px; cursor: pointer; transition: 0.2s; color: white; font-size: 1rem; }
        button:active { transform: scale(0.95); }
        .btn-slow { background: #f59e0b; }
        .btn-fast { background: #10b981; }
        .btn-stop { background: #ef4444; }

    </style>
</head>
<body>

<div class="container">
    <h1>🎮 The Game Loop (Pygame Engine)</h1>
    
    <div class="layout">
        <!-- The Game Screen -->
        <div class="screen-panel">
            <div style="margin-bottom: 10px; color: #94a3b8; font-weight: bold;">Display Surface</div>
            <div class="canvas-area" id="game-canvas">
                <div class="axis-label x-axis">X (Width) ➡️</div>
                <div class="axis-label y-axis">Y (Height) ➡️</div>
                <div class="coord-display" id="coords">(X: 50, Y: 50)</div>
                <div class="player-rect" id="player" style="left: 50px; top: 50px;"></div>
            </div>
        </div>

        <!-- The Code execution -->
        <div class="code-panel">
            <div class="code-line" style="margin-bottom: 15px;"><span class="keyword">while</span> running:</div>
            
            <div class="code-line comment"># 1. Erase the old frame</div>
            <div class="code-line" id="code-fill" style="margin-left: 15px;">screen.<span class="func">fill</span>((0,0,0))</div>
            
            <div class="code-line comment" style="margin-top: 15px;"># 2. Update logic & Move</div>
            <div class="code-line" id="code-update" style="margin-left: 15px;">player.x += speed</div>
            
            <div class="code-line comment" style="margin-top: 15px;"># 3. Draw the new frame</div>
            <div class="code-line" id="code-draw" style="margin-left: 15px;">pygame.draw.<span class="func">rect</span>(player)</div>
            
            <div class="code-line comment" style="margin-top: 15px;"># 4. Show it to the human</div>
            <div class="code-line" id="code-flip" style="margin-left: 15px;">pygame.display.<span class="func">flip</span>()</div>
        </div>
    </div>

    <div class="controls">
        <button class="btn-slow" onclick="startLoop(1000)">▶ Play at 1 FPS (Stop-Motion)</button>
        <button class="btn-fast" onclick="startLoop(16)">⏩ Play at 60 FPS (Smooth)</button>
        <button class="btn-stop" onclick="stopLoop()">⏹ Stop Engine</button>
    </div>
</div>

<script>
    let playerX = 50;
    let playerY = 50;
    let loopInterval = null;
    let direction = 1;

    async function gameLoopStep(delay) {
        const isSlow = delay > 50;
        const sleep = ms => new Promise(r => setTimeout(r, ms));

        // 1. Fill (Clear Screen)
        if (isSlow) { document.getElementById('code-fill').classList.add('active'); await sleep(delay * 0.2); }
        document.getElementById('player').style.display = 'none'; // Simulate clearing screen
        if (isSlow) document.getElementById('code-fill').classList.remove('active');

        // 2. Update Data
        if (isSlow) { document.getElementById('code-update').classList.add('active'); await sleep(delay * 0.2); }
        playerX += (20 * direction);
        playerY += (10 * direction);
        if (playerX > 450 || playerX < 50) direction *= -1; // Bounce
        document.getElementById('coords').innerText = `(X: ${playerX}, Y: ${playerY})`;
        if (isSlow) document.getElementById('code-update').classList.remove('active');

        // 3. Draw
        if (isSlow) { document.getElementById('code-draw').classList.add('active'); await sleep(delay * 0.2); }
        document.getElementById('player').style.left = playerX + 'px';
        document.getElementById('player').style.top = playerY + 'px';
        document.getElementById('player').style.display = 'block'; // Simulate drawing
        if (isSlow) document.getElementById('code-draw').classList.remove('active');

        // 4. Flip (Display)
        if (isSlow) { document.getElementById('code-flip').classList.add('active'); await sleep(delay * 0.2); }
        // Screen is already updated in DOM, just highlighting the concept
        if (isSlow) document.getElementById('code-flip').classList.remove('active');
    }

    function startLoop(delay) {
        stopLoop();
        // Reset position
        playerX = 50; playerY = 50; direction = 1;
        document.getElementById('coords').innerText = `(X: ${playerX}, Y: ${playerY})`;
        
        loopInterval = setInterval(() => gameLoopStep(delay), delay);
    }

    function stopLoop() {
        clearInterval(loopInterval);
        document.querySelectorAll('.active').forEach(el => el.classList.remove('active'));
        document.getElementById('player').style.display = 'block';
    }
</script>

</body>
</html>
