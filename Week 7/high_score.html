<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Arcade High Scores</title>
    <style>
        body { font-family: 'Courier New', Courier, monospace; background: #111827; color: #f9fafb; padding: 20px; display: flex; flex-direction: column; align-items: center; }
        .arcade-cabinet { background: #1f2937; border: 4px solid #374151; border-radius: 16px; padding: 30px; width: 100%; max-width: 500px; box-shadow: 0 0 30px rgba(0,0,0,0.8); }
        
        h1 { text-align: center; color: #fcd34d; font-size: 2.5rem; margin-top: 0; text-shadow: 0 0 10px #f59e0b; letter-spacing: 2px; }
        
        .screen { background: #030712; padding: 20px; border-radius: 8px; border: 2px inset #4b5563; min-height: 250px; position: relative; overflow: hidden; }
        
        /* Scanline effect */
        .screen::before { content: " "; display: block; position: absolute; top: 0; left: 0; bottom: 0; right: 0; background: linear-gradient(rgba(18, 16, 16, 0) 50%, rgba(0, 0, 0, 0.25) 50%), linear-gradient(90deg, rgba(255, 0, 0, 0.06), rgba(0, 255, 0, 0.02), rgba(0, 0, 255, 0.06)); z-index: 2; background-size: 100% 2px, 3px 100%; pointer-events: none; }
        
        .score-row { display: flex; justify-content: space-between; font-size: 1.5rem; margin-bottom: 10px; color: #10b981; text-shadow: 0 0 5px #059669; transition: 0.3s; }
        .score-row.new-score { color: #3b82f6; text-shadow: 0 0 10px #2563eb; animation: flash 1s infinite alternate; }
        .score-row.falling { opacity: 0; transform: translateY(20px); }
        
        @keyframes flash { from { opacity: 1; } to { opacity: 0.5; } }

        .rank { color: #f43f5e; }

        .controls { margin-top: 25px; display: flex; gap: 10px; }
        input { flex-grow: 1; padding: 12px; background: #374151; border: 2px solid #4b5563; color: white; font-family: 'Courier New', Courier, monospace; font-size: 1.2rem; font-weight: bold; text-align: center; border-radius: 4px; }
        input:focus { outline: none; border-color: #fcd34d; }
        button { padding: 12px 20px; background: #ef4444; color: white; font-family: 'Courier New', Courier, monospace; font-weight: bold; font-size: 1.2rem; border: none; border-radius: 4px; cursor: pointer; box-shadow: 0 4px 0 #b91c1c; transition: 0.1s; text-transform: uppercase; }
        button:active { transform: translateY(4px); box-shadow: 0 0 0 #b91c1c; }

    </style>
</head>
<body>

<div class="arcade-cabinet">
    <h1>HIGH SCORES</h1>
    
    <div class="screen" id="score-screen">
        <!-- Scores render here -->
    </div>

    <div class="controls">
        <input type="number" id="new-score" placeholder="ENTER SCORE">
        <button onclick="submitScore()">INSERT COIN</button>
    </div>
</div>

<script>
    // Our initial list of scores
    let highScores = [9500, 8200, 7100, 5000, 3200];
    let lastAdded = -1;

    function renderScores() {
        const screen = document.getElementById('score-screen');
        screen.innerHTML = '';
        
        // Ensure it's sorted descending (like Python's .sort(reverse=True))
        highScores.sort((a, b) => b - a);

        // Keep only top 5
        if (highScores.length > 5) {
            highScores = highScores.slice(0, 5);
        }

        highScores.forEach((score, index) => {
            const isNew = score === lastAdded;
            let className = 'score-row';
            if (isNew) className += ' new-score';
            
            screen.innerHTML += `
                <div class="${className}">
                    <span class="rank">#${index + 1}</span>
                    <span class="val">${score}</span>
                </div>
            `;
        });
        
        // Reset the flash after a bit
        setTimeout(() => {
            document.querySelectorAll('.new-score').forEach(el => el.classList.remove('new-score'));
            lastAdded = -1;
        }, 2000);
    }

    function submitScore() {
        const input = document.getElementById('new-score');
        const score = parseInt(input.value);
        
        if (!isNaN(score)) {
            // Add to the list (Python equivalent: list.append(score))
            highScores.push(score);
            lastAdded = score;
            
            renderScores();
            input.value = '';
            input.focus();
        }
    }

    // Initial render
    renderScores();
</script>

</body>
</html>
