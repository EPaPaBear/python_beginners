<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>MixTape OS: Playlist Visualizer</title>
    <style>
        body { font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif; background: #18181b; color: #f4f4f5; padding: 20px; display: flex; flex-direction: column; align-items: center; }
        .container { width: 100%; max-width: 600px; background: #27272a; padding: 30px; border-radius: 16px; border: 1px solid #3f3f46; box-shadow: 0 15px 30px rgba(0,0,0,0.5); }
        h1 { margin-top: 0; color: #a855f7; text-align: center; font-size: 2rem; display: flex; align-items: center; justify-content: center; gap: 10px; }
        
        /* Currently Playing Area */
        .now-playing { background: #3f3f46; padding: 20px; border-radius: 12px; text-align: center; margin-bottom: 30px; border: 2px solid #a855f7; box-shadow: 0 0 20px rgba(168, 85, 247, 0.2); }
        .now-playing h3 { margin: 0 0 10px 0; color: #d4d4d8; font-size: 0.9rem; text-transform: uppercase; letter-spacing: 2px; }
        #current-song { font-size: 1.5rem; font-weight: bold; color: #f4f4f5; }
        
        /* The List/Queue UI */
        .queue-panel { background: #18181b; padding: 15px; border-radius: 12px; min-height: 150px; margin-bottom: 20px; border: 1px solid #3f3f46; }
        .queue-title { color: #a1a1aa; font-size: 0.9rem; text-transform: uppercase; font-weight: bold; margin-bottom: 15px; }
        
        .song-card { background: #27272a; padding: 12px 15px; border-radius: 8px; margin-bottom: 8px; display: flex; justify-content: space-between; align-items: center; border-left: 4px solid #3b82f6; transition: all 0.3s ease; }
        .song-card.playing-anim { transform: translateX(-20px); opacity: 0; border-left-color: #a855f7; }
        .song-index { color: #71717a; font-family: monospace; font-size: 1.1rem; font-weight: bold; margin-right: 15px; }
        .song-name { font-weight: bold; flex-grow: 1; }
        
        /* Controls */
        .controls { display: flex; gap: 10px; }
        input { flex-grow: 1; padding: 12px; background: #18181b; border: 1px solid #3f3f46; color: white; border-radius: 8px; font-size: 1rem; outline: none; }
        input:focus { border-color: #a855f7; }
        
        button { padding: 12px 20px; font-weight: bold; border: none; border-radius: 8px; cursor: pointer; transition: 0.2s; color: white; font-size: 1rem; }
        button:active { transform: scale(0.95); }
        .btn-add { background: #3b82f6; }
        .btn-add:hover { background: #2563eb; }
        .btn-play { background: #a855f7; width: 100%; margin-top: 10px; font-size: 1.2rem; padding: 15px; }
        .btn-play:hover { background: #9333ea; }

    </style>
</head>
<body>

<div class="container">
    <h1>🎧 MixTape OS</h1>
    
    <div class="now-playing">
        <h3>Now Playing</h3>
        <div id="current-song">-- Silence --</div>
    </div>
    
    <div class="queue-panel">
        <div class="queue-title">Up Next (The List)</div>
        <div id="queue-list">
            <!-- Songs render here -->
        </div>
    </div>

    <div>
        <div class="controls">
            <input type="text" id="song-input" placeholder="Type a song name...">
            <button class="btn-add" onclick="addSong()">+ Add to Queue</button>
        </div>
        <button class="btn-play" onclick="playNext()">▶ Play Next Song</button>
    </div>
</div>

<script>
    let playlist = ["Blinding Lights", "Bohemian Rhapsody"];

    function renderQueue() {
        const list = document.getElementById('queue-list');
        list.innerHTML = '';
        
        if (playlist.length === 0) {
            list.innerHTML = '<div style="color: #71717a; text-align: center; padding: 20px;">Queue is empty. Add some tracks!</div>';
            return;
        }

        playlist.forEach((song, index) => {
            list.innerHTML += `
                <div class="song-card" id="song-${index}">
                    <span class="song-index">${index}</span>
                    <span class="song-name">${song}</span>
                </div>
            `;
        });
    }

    function addSong() {
        const input = document.getElementById('song-input');
        const songName = input.value.trim();
        
        if (songName) {
            playlist.push(songName); // append() in Python
            renderQueue();
            input.value = '';
        }
    }

    function playNext() {
        if (playlist.length > 0) {
            // Animate the top song leaving
            const topCard = document.getElementById('song-0');
            topCard.classList.add('playing-anim');
            
            setTimeout(() => {
                // Remove from front of array: equivalent to pop(0) in Python
                const nextSong = playlist.shift(); 
                document.getElementById('current-song').innerText = "🎵 " + nextSong;
                renderQueue();
            }, 300);
        } else {
            document.getElementById('current-song').innerText = "-- Silence --";
        }
    }

    // Initial render
    renderQueue();
</script>

</body>
</html>
